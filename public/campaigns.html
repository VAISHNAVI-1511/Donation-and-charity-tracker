<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Campaigns | HopeFund</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav>
            <div style="display: flex; align-items: center; gap: 2rem;">
                <a href="index.html" class="logo">HopeFund</a>
                <div class="dropdown">
                    <button class="dropbtn" style="background: none; border: none; color: var(--text); font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-family: inherit;">
                        Browse <span style="font-size: 0.7rem;">▼</span>
                    </button>
                    <div class="dropdown-content glass" id="browse-dropdown-content">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Explore</a></li>
                <li><a href="create-campaign.html" id="create-btn">Start Campaign</a></li>
                <li id="auth-links">
                    <a href="login.html">Login</a>
                </li>
            </ul>
        </nav>

        <header style="margin-top: 4rem; margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 2rem;">
            <div>
                <h1 id="browse-title" style="font-size: 2.5rem; font-weight: 800;">Browse Fundraisers</h1>
                <p id="browse-description" style="color: var(--text-muted); font-size: 1.1rem; margin-top: 0.5rem;">Discover and support causes that matter to you.</p>
            </div>
            
            <div class="search-filter glass" style="padding: 0.8rem; display: flex; gap: 1rem; width: 100%; max-width: 500px;">
                <input type="text" id="search-input" placeholder="Search fundraisers..." style="flex: 1; background: transparent; border: none; color: var(--text); outline: none;">
                <select id="category-filter" style="background: transparent; border: none; color: var(--text-muted); cursor: pointer; outline: none; font-family: inherit;">
                    <option value="">All Categories</option>
                    <option value="Medical">Medical</option>
                    <option value="Education">Education</option>
                    <option value="Disaster Relief">Disaster Relief</option>
                    <option value="Animal Rescue">Animal Rescue</option>
                    <option value="Community Support">Community Support</option>
                    <option value="Environment">Environment</option>
                    <option value="Child Welfare">Child Welfare</option>
                    <option value="Elderly Care">Elderly Care</option>
                    <option value="Women Empowerment">Women Empowerment</option>
                    <option value="Sports">Sports</option>
                    <option value="Arts & Culture">Arts & Culture</option>
                    <option value="Technology">Technology</option>
                    <option value="Emergency Help">Emergency Help</option>
                    <option value="Food & Hunger">Food & Hunger</option>
                    <option value="Shelter & Housing">Shelter & Housing</option>
                </select>
                <button class="btn btn-primary" id="search-btn" style="padding: 0.5rem 1.25rem;">Search</button>
            </div>
        </header>

        <div class="campaign-grid" id="campaign-list" style="margin-top: 2rem;">
            <!-- Loaded dynamically -->
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const category = params.get("category");
            const search = params.get("search");

            const titleEl = document.getElementById('browse-title');
            const descEl = document.getElementById('browse-description');
            const catFilter = document.getElementById('category-filter');
            const searchInput = document.getElementById('search-input');

            if (category) {
                titleEl.innerText = `${category} Fundraisers`;
                descEl.innerText = `Supporting causes in the ${category} category.`;
                catFilter.value = category;
            } else if (search) {
                titleEl.innerText = `Search: ${search}`;
                searchInput.value = search;
            }

            loadCampaigns(search || '', category || '');
        });
    </script>
</body>
</html>
