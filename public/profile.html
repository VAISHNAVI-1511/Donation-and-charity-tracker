<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | HopeFund</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <nav>
            <div style="display: flex; align-items: center; gap: 2rem;">
                <a href="index.html" class="logo">HopeFund</a>
                <div class="dropdown">
                    <button class="dropbtn" style="background: none; border: none; color: var(--text); font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-family: inherit;">
                        Browse <span style="font-size: 0.7rem;">▼</span>
                    </button>
                    <div class="dropdown-content glass" id="browse-dropdown-content">
                        <!-- Categories will be added here via JS -->
                    </div>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Explore</a></li>
                <li><a href="create-campaign.html">Start Campaign</a></li>
                <li id="auth-links"></li>
            </ul>
        </nav>

        <div class="profile-container glass fade-in" style="max-width: 800px; margin: 4rem auto; padding: 3rem;">
            <div style="display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem;">
                <div id="profile-avatar" style="width: 100px; height: 100px; border-radius: 50%; background: var(--primary); display: flex; justify-content: center; align-items: center; font-size: 3rem; font-weight: 800; color: white;">
                    ?
                </div>
                <div>
                    <h1 id="profile-name">Loading...</h1>
                    <p id="profile-email" style="color: var(--text-muted);"></p>
                    <div id="profile-role" style="display: inline-block; margin-top: 0.5rem; padding: 0.2rem 0.8rem; background: var(--glass-bg); border-radius: 20px; font-size: 0.8rem; color: var(--primary); font-weight: 600;">
                        User
                    </div>
                </div>
            </div>

            <div class="stats-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem;">
                 <div class="glass" style="padding: 1.5rem; text-align: center;">
                    <div style="color: var(--text-muted); font-size: 0.9rem;">Your Campaigns</div>
                    <div id="user-campaigns-count" style="font-size: 2rem; font-weight: 700; color: var(--secondary);">0</div>
                </div>
                <div class="glass" style="padding: 1.5rem; text-align: center;">
                    <div style="color: var(--text-muted); font-size: 0.9rem;">Total Impact</div>
                    <div id="user-impact-total" style="font-size: 2rem; font-weight: 700; color: var(--accent);">₹0</div>
                </div>
            </div>

            <div style="margin-top: 3rem;">
                <h3 style="margin-bottom: 1.5rem;">Quick Actions</h3>
                <div style="display: flex; gap: 1rem;">
                    <a href="create-campaign.html" class="btn btn-primary">Launch New Campaign</a>
                    <button class="btn glass" onclick="auth.logout()">Sign Out</button>
                    <a href="dashboard.html" id="admin-link" class="btn glass" style="display: none;">Admin Panel</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
